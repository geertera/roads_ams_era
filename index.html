<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Netherlands Traffic</title>

  <style>
    :root {
      --era-pink: #ff2e63;
      --era-orange: #ff7a1a;
      --era-purple: #7c3cff;
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.66);
      --card: rgba(10, 10, 10, 0.76);
      --border: rgba(255, 255, 255, 0.15);
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      color: var(--text);
      background: #050505;
      font-family: Arial, Helvetica, "Liberation Sans", sans-serif;
    }

    body {
      background:
        linear-gradient(115deg, rgba(0, 0, 0, 0.96) 0%, rgba(0, 0, 0, 0.86) 48%, rgba(0, 0, 0, 0.58) 100%),
        linear-gradient(135deg, #111111 0%, #050505 58%, #190815 100%);
    }

    .background-accent {
      position: fixed;
      right: -240px;
      bottom: -280px;
      width: 720px;
      height: 720px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 46, 99, 0.34), rgba(124, 60, 255, 0.18) 42%, transparent 68%);
      z-index: 0;
    }

    .brand-mark {
      position: fixed;
      top: 58px;
      left: 72px;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 14px;
      letter-spacing: 0.18em;
      font-size: 16px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .brand-dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--era-pink);
    }

    .page {
      position: relative;
      z-index: 1;
      height: 100vh;
      width: 100vw;
      padding: 72px;
      display: grid;
      grid-template-columns: 0.88fr 1.28fr;
      align-items: center;
      gap: 72px;
    }

    .hero { padding-top: 48px; }

    .eyebrow {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.24em;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 24px;
    }

    .title {
      margin: 0;
      font-size: 116px;
      line-height: 0.9;
      letter-spacing: -0.08em;
      font-weight: 800;
      text-transform: uppercase;
      max-width: 780px;
    }

    .accent-line {
      width: 250px;
      height: 8px;
      margin-top: 36px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--era-pink), var(--era-orange), var(--era-purple));
    }

    .summary {
      margin-top: 42px;
      display: grid;
      grid-template-columns: repeat(2, 150px);
      gap: 18px;
    }

    .summary-box {
      padding: 18px 20px;
      border: 1px solid var(--border);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.06);
    }

    .summary-number {
      font-size: 42px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: -0.05em;
    }

    .summary-label {
      margin-top: 7px;
      color: var(--muted);
      font-size: 15px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 700;
    }

    .traffic-card {
      justify-self: end;
      width: 100%;
      min-height: 620px;
      padding: 48px;
      border: 1px solid var(--border);
      border-radius: 36px;
      background: var(--card);
      box-shadow: 0 28px 70px rgba(0, 0, 0, 0.45);
      position: relative;
      overflow: hidden;
    }

    .traffic-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 7px;
      border-radius: 36px 36px 0 0;
      background: linear-gradient(90deg, var(--era-pink), var(--era-orange), var(--era-purple));
    }

    .card-label {
      color: var(--muted);
      font-size: 19px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 32px;
    }

    .traffic-list { display: grid; gap: 20px; }

    .traffic-item {
      display: grid;
      grid-template-columns: 96px 1fr 132px;
      gap: 22px;
      align-items: center;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }

    .traffic-item:last-child { border-bottom: 0; padding-bottom: 0; }

    .road {
      width: 76px;
      min-height: 56px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 25px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--era-pink), var(--era-orange));
      color: #ffffff;
    }

    .headline {
      margin: 0;
      font-size: 30px;
      line-height: 1.08;
      letter-spacing: -0.035em;
      font-weight: 800;
    }

    .meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.28;
    }

    .impact {
      text-align: right;
      font-size: 31px;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .impact-label {
      margin-top: 5px;
      color: var(--muted);
      font-size: 17px;
      font-weight: 600;
    }

    .status {
      color: var(--muted);
      font-size: 26px;
      line-height: 1.3;
      margin-top: 120px;
    }
  </style>
</head>

<body>
  <div class="background-accent"></div>

  <div class="brand-mark">
    <div class="brand-dot"></div>
    We Are Era
  </div>

  <main class="page">
    <section class="hero" aria-label="Traffic source">
      <div class="eyebrow">ANWB Live</div>
      <h1 class="title">Netherlands traffic</h1>
      <div class="accent-line"></div>

      <div class="summary">
        <div class="summary-box">
          <div class="summary-number" id="jam-count">--</div>
          <div class="summary-label">Traffic jams</div>
        </div>
        <div class="summary-box">
          <div class="summary-number" id="jam-km">--</div>
          <div class="summary-label">Total KM</div>
        </div>
      </div>
    </section>

    <section class="traffic-card" aria-label="Traffic in the Netherlands">
      <div class="card-label">Current traffic jams</div>
      <div id="traffic" class="traffic-list">
        <div class="status">Loading traffic...</div>
      </div>
    </section>
  </main>

  <script>
    var ANWB_URL = 'https://www.anwb.nl/verkeer/filelijst';

    function buildApiUrl() {
      return 'https://corsproxy.io/?' + encodeURIComponent(ANWB_URL + '?_=' + new Date().getTime());
    }

    function clean(text) {
      return String(text || '').replace(/\s+/g, ' ').trim();
    }

    function escapeHtml(text) {
      return clean(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function extractTextFromResponse(responseText) {
      var parser = new DOMParser();
      var doc = parser.parseFromString(responseText, 'text/html');
      return clean(doc.body ? doc.body.textContent : responseText);
    }

    function parseTraffic(text) {
      var items = [];
      var totalKm = 0;
      var seen = {};

      text = clean(text)
        .replace(/\{/g, ' ')
        .replace(/\}/g, ' ')
        .replace(/\[/g, ' ')
        .replace(/\]/g, ' ')
        .replace(/"/g, ' ')
        .replace(/:/g, ' ')
        .replace(/,/g, ' ');

      var words = text.split(' ');

      function isRoad(word) {
        if (!word || word.length < 2 || word.length > 4) return false;
        var first = word.charAt(0);
        if (first !== 'A' && first !== 'N' && first !== 'E') return false;
        var rest = word.substring(1);
        return String(parseInt(rest, 10)) === rest;
      }

      function isNumber(word) {
        return String(parseInt(word, 10)) === word;
      }

      for (var i = 0; i < words.length; i++) {
        if (!isRoad(words[i])) continue;

        var road = words[i];
        var routeWords = [];
        var delay = 0;
        var km = 0;
        var closed = false;
        var end = Math.min(words.length, i + 26);

        for (var j = i + 1; j < end; j++) {
          var word = words[j];
          var prev = words[j - 1];

          if (j > i + 1 && isRoad(word)) break;

          if (word === 'min' && isNumber(prev)) {
            delay = parseInt(prev, 10);
            continue;
          }

          if (word === 'km' && isNumber(prev)) {
            km = parseInt(prev, 10);
            continue;
          }

          if (word === 'Dicht') {
            closed = true;
            continue;
          }

          if (
            word === '+' ||
            word === 'min' ||
            word === 'km' ||
            word === 'alertC' ||
            word === 'text' ||
            word === 'reason' ||
            word === 'Langzaam' ||
            word === 'rijdend' ||
            word === 'tot' ||
            word === 'stilstaand' ||
            word === 'verkeer' ||
            word === 'Te' ||
            word === 'hoog' ||
            word === 'voertuig'
          ) {
            continue;
          }

          if (routeWords.length < 8 && !isNumber(word)) {
            routeWords.push(word);
          }
        }

        if (!km && !delay && !closed) continue;

        var route = clean(routeWords.join(' '));
        if (!route || route.length < 4) route = 'Netherlands';
        if (route.indexOf('alertC') > -1 || route.indexOf('reason') > -1 || route.indexOf('text') > -1) continue;

        var key = road + '|' + route + '|' + km + '|' + delay + '|' + closed;
        if (seen[key]) continue;
        seen[key] = true;

        items.push({
          road: road,
          route: route,
          delay: delay,
          km: km,
          closed: closed
        });

        totalKm += km;
      }

      items.sort(function (a, b) {
        if (b.delay !== a.delay) return b.delay - a.delay;
        return b.km - a.km;
      });

      return {
        items: items.slice(0, 6),
        totalItems: items.length,
        totalKm: totalKm
      };
    }

    function renderTrafficFromText(responseText) {
      var container = document.getElementById('traffic');
      var text = extractTextFromResponse(responseText);
      var parsed = parseTraffic(text);
      var items = parsed.items;

      document.getElementById('jam-count').textContent = parsed.totalItems;
      document.getElementById('jam-km').textContent = parsed.totalKm;

      if (!items.length) {
        container.innerHTML = '<div class="status">No current traffic jams found.</div>';
        return;
      }

      var html = '';
      for (var i = 0; i < items.length; i++) {
        var item = items[i];
        var impactValue = item.closed ? 'Closed' : (item.delay ? '+' + item.delay + ' min' : (item.km ? item.km + ' km' : 'Live'));
        var impactLabel = item.closed ? 'road' : (item.km ? item.km + ' km' : 'update');

        html += '<article class="traffic-item">' +
          '<div class="road">' + escapeHtml(item.road) + '</div>' +
          '<div>' +
            '<h2 class="headline">Traffic jam</h2>' +
            '<div class="meta">' + escapeHtml(item.route) + '</div>' +
          '</div>' +
          '<div class="impact">' +
            escapeHtml(impactValue) +
            '<div class="impact-label">' + escapeHtml(impactLabel) + '</div>' +
          '</div>' +
        '</article>';
      }

      container.innerHTML = html;
    }

    function loadTraffic() {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', buildApiUrl(), true);
      xhr.setRequestHeader('Cache-Control', 'no-cache');
      xhr.onreadystatechange = function () {
        if (xhr.readyState === 4) {
          if (xhr.status >= 200 && xhr.status < 300) {
            try {
              renderTrafficFromText(xhr.responseText);
            } catch (error) {
              document.getElementById('traffic').innerHTML = '<div class="status">Traffic data could not be read.</div>';
            }
          } else {
            document.getElementById('traffic').innerHTML = '<div class="status">Traffic data is temporarily unavailable.</div>';
          }
        }
      };
      xhr.send();
    }

    loadTraffic();
    setInterval(loadTraffic, 60000);

    setTimeout(function () {
      window.location.reload();
    }, 21600000);
  </script>
</body>
</html>
