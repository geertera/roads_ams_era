<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Traffic</title>

  <style>
    :root {
      --era-pink: #ff2e63;
      --era-orange: #ff7a1a;
      --era-purple: #7c3cff;
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.66);
      --card: rgba(10, 10, 10, 0.76);
      --border: rgba(255, 255, 255, 0.15);
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      color: var(--text);
      background: #050505;
      font-family: Arial, Helvetica, "Liberation Sans", sans-serif;
    }

    body {
      background:
        linear-gradient(115deg, rgba(0, 0, 0, 0.96) 0%, rgba(0, 0, 0, 0.86) 48%, rgba(0, 0, 0, 0.58) 100%),
        linear-gradient(135deg, #111111 0%, #050505 58%, #190815 100%);
    }

    .background-accent {
      position: fixed;
      right: -240px;
      bottom: -280px;
      width: 720px;
      height: 720px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 46, 99, 0.34), rgba(124, 60, 255, 0.18) 42%, transparent 68%);
      z-index: 0;
    }

    .brand-mark {
      position: fixed;
      top: 58px;
      left: 72px;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 14px;
      letter-spacing: 0.18em;
      font-size: 16px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .brand-dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--era-pink);
    }

    .page {
      position: relative;
      z-index: 1;
      height: 100vh;
      width: 100vw;
      padding: 72px;
      display: grid;
      grid-template-columns: 0.88fr 1.28fr;
      align-items: center;
      gap: 72px;
    }

    .hero { padding-top: 48px; }

    .eyebrow {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.24em;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 24px;
    }

    .title {
      margin: 0;
      font-size: 116px;
      line-height: 0.9;
      letter-spacing: -0.08em;
      font-weight: 800;
      text-transform: uppercase;
      max-width: 780px;
    }

    .accent-line {
      width: 250px;
      height: 8px;
      margin-top: 36px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--era-pink), var(--era-orange), var(--era-purple));
    }

    .summary {
      margin-top: 42px;
      display: grid;
      grid-template-columns: repeat(2, 150px);
      gap: 18px;
    }

    .summary-box {
      padding: 18px 20px;
      border: 1px solid var(--border);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.06);
    }

    .summary-number {
      font-size: 42px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: -0.05em;
    }

    .summary-label {
      margin-top: 7px;
      color: var(--muted);
      font-size: 15px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 700;
    }

    .traffic-card {
      justify-self: end;
      width: 100%;
      min-height: 620px;
      padding: 48px;
      border: 1px solid var(--border);
      border-radius: 36px;
      background: var(--card);
      box-shadow: 0 28px 70px rgba(0, 0, 0, 0.45);
      position: relative;
      overflow: hidden;
    }

    .traffic-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 7px;
      border-radius: 36px 36px 0 0;
      background: linear-gradient(90deg, var(--era-pink), var(--era-orange), var(--era-purple));
    }

    .card-label {
      color: var(--muted);
      font-size: 19px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 32px;
    }

    .traffic-list { display: grid; gap: 20px; }

    .traffic-item {
      display: grid;
      grid-template-columns: 96px 1fr 132px;
      gap: 22px;
      align-items: center;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }

    .traffic-item:last-child { border-bottom: 0; padding-bottom: 0; }

    .road {
      width: 76px;
      min-height: 56px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 25px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--era-pink), var(--era-orange));
      color: #ffffff;
    }

    .headline {
      margin: 0;
      font-size: 30px;
      line-height: 1.08;
      letter-spacing: -0.035em;
      font-weight: 800;
    }

    .meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.28;
      max-height: 46px;
      overflow: hidden;
    }

    .impact {
      text-align: right;
      font-size: 27px;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .impact-label {
      margin-top: 5px;
      color: var(--muted);
      font-size: 17px;
      font-weight: 600;
    }

    .status {
      color: var(--muted);
      font-size: 26px;
      line-height: 1.3;
      margin-top: 120px;
    }
  </style>
</head>

<body>
  <div class="background-accent"></div>

  <div class="brand-mark">
    <div class="brand-dot"></div>
    We Are Era
  </div>

  <main class="page">
    <section class="hero" aria-label="Traffic source">
      <div class="eyebrow">Verkeerplaza Live</div>
      <h1 class="title">Traffic</h1>
      <div class="accent-line"></div>

      <div class="summary">
        <div class="summary-box">
          <div class="summary-number" id="traffic-count">--</div>
          <div class="summary-label">Items</div>
        </div>
        <div class="summary-box">
          <div class="summary-number" id="traffic-roads">--</div>
          <div class="summary-label">Roads</div>
        </div>
      </div>
    </section>

    <section class="traffic-card" aria-label="Traffic updates">
      <div class="card-label">Current traffic updates</div>
      <div id="traffic" class="traffic-list">
        <div class="status">Loading traffic...</div>
      </div>
    </section>
  </main>

  <script>
    var RSS_FEED = 'https://www.verkeerplaza.nl/rssfeed';
    var RSS_URL = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(RSS_FEED);

    function clean(text) {
      return String(text || '').replace(/\s+/g, ' ').trim();
    }

    function stripHtml(html) {
      var div = document.createElement('div');
      div.innerHTML = html || '';
      return clean(div.textContent || '');
    }

    function escapeHtml(text) {
      return clean(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function shortText(text, maxLength) {
      text = clean(text);
      if (text.length <= maxLength) return text;
      return text.substring(0, maxLength).replace(/\s+\S*$/, '') + '...';
    }

    function roadFromText(text) {
      var match = clean(text).match(/\b[ANE]\d{1,3}\b/);
      return match ? match[0] : 'NL';
    }

    function typeFromText(text) {
      var lower = clean(text).toLowerCase();
      if (lower.indexOf('file') > -1 || lower.indexOf('langzaam') > -1 || lower.indexOf('vertraging') > -1) return 'Traffic jam';
      if (lower.indexOf('ongeval') > -1 || lower.indexOf('aanrijding') > -1 || lower.indexOf('incident') > -1) return 'Incident';
      if (lower.indexOf('afgesloten') > -1 || lower.indexOf('dicht') > -1) return 'Closed road';
      if (lower.indexOf('werk') > -1) return 'Roadworks';
      return 'Traffic update';
    }

    function impactFromText(text) {
      var lower = clean(text).toLowerCase();
      var min = lower.match(/(\d{1,3})\s*min/);
      var km = lower.match(/(\d{1,3})\s*km/);

      if (min) {
        return { value: '+' + min[1] + ' min', label: km ? km[1] + ' km' : 'delay' };
      }

      if (km) {
        return { value: km[1] + ' km', label: 'traffic' };
      }

      if (lower.indexOf('dicht') > -1 || lower.indexOf('afgesloten') > -1) {
        return { value: 'Closed', label: 'road' };
      }

      return { value: 'Live', label: 'update' };
    }

    function isRelevantTraffic(text) {
      var lower = clean(text).toLowerCase();
      if (lower.length < 5) return false;
      return (
        lower.indexOf('file') > -1 ||
        lower.indexOf('vertraging') > -1 ||
        lower.indexOf('ongeval') > -1 ||
        lower.indexOf('aanrijding') > -1 ||
        lower.indexOf('afgesloten') > -1 ||
        lower.indexOf('dicht') > -1 ||
        lower.indexOf('werk') > -1 ||
        lower.indexOf('a1') > -1 ||
        lower.indexOf('a2') > -1 ||
        lower.indexOf('a4') > -1 ||
        lower.indexOf('a9') > -1 ||
        lower.indexOf('a10') > -1 ||
        lower.indexOf('a12') > -1 ||
        lower.indexOf('a15') > -1 ||
        lower.indexOf('a16') > -1 ||
        lower.indexOf('a27') > -1 ||
        lower.indexOf('a28') > -1
      );
    }

    function render(items) {
      var container = document.getElementById('traffic');
      var parsed = [];
      var roads = {};

      for (var i = 0; i < items.length; i++) {
        var item = items[i];
        var titleNode = item.getElementsByTagName('title')[0];
        var descNode = item.getElementsByTagName('description')[0];
        var title = stripHtml(titleNode ? titleNode.textContent : '');
        var desc = stripHtml(descNode ? descNode.textContent : '');
        var combined = clean(title + ' ' + desc);

        if (!isRelevantTraffic(combined)) continue;

        var road = roadFromText(combined);
        var type = typeFromText(combined);
        var impact = impactFromText(combined);

        roads[road] = true;

        parsed.push({
          road: road,
          type: type,
          title: title,
          desc: desc,
          impact: impact
        });
      }

      parsed = parsed.slice(0, 6);

      document.getElementById('traffic-count').textContent = parsed.length;
      document.getElementById('traffic-roads').textContent = Object.keys(roads).length;

      if (!parsed.length) {
        container.innerHTML = '<div class="status">No current traffic issues.</div>';
        return;
      }

      var html = '';
      for (var j = 0; j < parsed.length; j++) {
        var traffic = parsed[j];
        var detail = traffic.desc || traffic.title;

        html += '<article class="traffic-item">' +
          '<div class="road">' + escapeHtml(traffic.road) + '</div>' +
          '<div>' +
            '<h2 class="headline">' + escapeHtml(traffic.type) + '</h2>' +
            '<div class="meta">' + escapeHtml(shortText(detail, 120)) + '</div>' +
          '</div>' +
          '<div class="impact">' +
            escapeHtml(traffic.impact.value) +
            '<div class="impact-label">' + escapeHtml(traffic.impact.label) + '</div>' +
          '</div>' +
        '</article>';
      }

      container.innerHTML = html;
    }

    function load() {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', RSS_URL + '&_=' + new Date().getTime(), true);
      xhr.onreadystatechange = function () {
        if (xhr.readyState === 4) {
          if (xhr.status >= 200 && xhr.status < 300) {
            var parser = new DOMParser();
            var xml = parser.parseFromString(xhr.responseText, 'text/xml');
            var items = xml.getElementsByTagName('item');
            render(items);
          } else {
            document.getElementById('traffic').innerHTML = '<div class="status">Traffic unavailable.</div>';
          }
        }
      };
      xhr.send();
    }

    load();
    setInterval(load, 120000);

    setTimeout(function () {
      window.location.reload();
    }, 21600000);
  </script>
</body>
</html>
